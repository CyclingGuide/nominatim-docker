version: "3.8"

services:
  nova_scotia:
    image: mediagis/nominatim:5.1
    container_name: nominatim-ns
    restart: unless-stopped
    shm_size: "2g"
    ports:
      - "18080:8080"
    environment:
      PBF_URL: https://download.geofabrik.de/north-america/canada/nova-scotia-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/north-america/canada/nova-scotia-updates/
      UPDATE_MODE: continuous
      NOMINATIM_IMPORT_OSMPGSQL_CACHE: 500
    volumes:
      - /opt/nominatim-data/ns/data:/nominatim/data
      - /opt/nominatim-data/ns/flatnode:/nominatim/flatnode
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/status || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 20m

  ontario:
